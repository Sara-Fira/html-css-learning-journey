<!-- Step 1: Add the document type declaration -->
<!DOCTYPE html>
<html>
  <!-- Step 2: Add the opening and closing tags for the head section -->
  <head>
    <title>Challenge: HTML Document Structure</title>

    <!-- Step 3: Add the character encoding -->
    <meta charset="UTF-8" />
  </head>

  <!-- Step 4: Add the opening and closing tags for the body section -->
  <body>
    <h1>Main heading of the HTML document</h1>
    <p>Text paragraph</p>
  </body>
</html>
